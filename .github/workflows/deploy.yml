name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Lets the build job read secrets stored on the github-pages *environment* (not only repo secrets)
    environment: github-pages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install and build
        env:
          NEXT_PUBLIC_BASE_PATH: /My-Portfolio
          NEXT_PUBLIC_SITE_URL: https://muhunami.github.io/My-Portfolio
        run: |
          # Prefer repository or environment secret named ADMIN_PASSWORD; fallback NEXT_PUBLIC_ADMIN_PASSWORD
          export NEXT_PUBLIC_ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}"
          if [ -z "$NEXT_PUBLIC_ADMIN_PASSWORD" ]; then
            export NEXT_PUBLIC_ADMIN_PASSWORD="${{ secrets.NEXT_PUBLIC_ADMIN_PASSWORD }}"
          fi
          npm ci
          npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
